apiVersion: apps/v1
kind: StateFulSate
metadata:
  name: mysql-statfulset
  namespace: mysql-ns

spec:
  serviceName: mysql-svc
  replicas: 1
  selector:
    matchLables:
      app: mysql
  template:
    matchLabels:
      metadata:
        app: mysql

      spec:
        containers:
          - name: mysql-statefulset-pod
            image: mysql:8.0
            ports:
              - containerPort: 3306
            resoures:
              requests:
                cpu: 300M
                memory: 300Mi

            envFrom:
              - secretRef:
                  name: mysql-secret

            volumeMounts:
              - name: mysql-storage-path
                mountPath: /var/lib/mysql





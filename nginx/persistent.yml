apiVersion: v1
kind: PersistentVolume

metadata:
  name: local-pv
  namespace: defualt
  labels:
    app: local
    

spec:
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteOnce

  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-pvc
  hostPath:
    path: /mnt/data
    
    

name: this is ci for python app

on: 
  push:
    branches:
    - main

jobs: 
  build-and-run:
    runs-on: ubuntu-latest

    steps:
     - name: checkout code
       uses: actions/checkout@v4

     - name: login to Dockerhub.io  
       uses: docker/login-action@v3
       with:
        username: ${{ secrets.DOCKER_USER_NAME }}
        password: ${{ secrets.DOCKER_LOGIN_PASS }}

     - name: build docker images
       working-directory: ./server-app
       run: docker build -t ${{ secrets.DOCKER_USER_NAME}}/my-app-images:latest .

     - name: push images on Dockerhub.io
       run: docker push ${{ secrets.DOCKER_LOGIN_PASS }}/my-app-images:latest 
     - name: spins the container for images base
       run: docker run -d -p 9000:9000 -v /project/docker-app:/project-app  --name app-container ${{ secrets.DOCKER_USER_NAME }}/my-app-images:latest  

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: apche-hpa
  namespace: apache-server
  labels:
    run: apache

spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: apche-deploument
  minReplicas: 1
  maxReplicas: 15

  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 5 

    


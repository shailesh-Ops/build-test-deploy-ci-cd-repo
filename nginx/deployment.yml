apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
  namespace: nginx 
  labels:
    app: nginx
  namespace: nginx 

spec:
  replicas: 3
  selector:
    matchLabels:
      app: nginx

  template:
    metadata:
      labels:
        app: nginx
        
    spec:
      containers:
      - name: nginx
        image: nginx:latest
        ports: 
        - containerPort: 80
        volumeMounts:
        - name: local-volume-nginx
          mountPath: /var/www/html

      volumes:        
        - name: local-volume-nginx
          persistentVolumeClaim: 
            claimName: local-pvc


apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: nginx-daemonsets
  labels:
    app: nginx
  namespace: nginx 

spec:
  selector:
    matchLabels:
      app: nginx

  template:
    metadata:
      labels:
        app: nginx
        
    spec:
      containers:
      - name: nginx
        image: nginx:latest
        ports:
        - containerPort: 80

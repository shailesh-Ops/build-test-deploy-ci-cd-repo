apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
  lables:
    app: apps/nginx
  namespace: nginx

spec:
  replicas: 3
  selector:
    machLables:
      app: apps/nginx

  template:
    metadata:
      lables:
        app: apps/nginx

    spec:
      containers:
        - name: nginx-pod
          image: nginx:latest

          ports:
            - containerPort: 80

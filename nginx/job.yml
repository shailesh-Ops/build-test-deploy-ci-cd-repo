apiVersion: batch/v1
kind: Job
metadata:
  name: test-job
  namespace: nginx

spec:
  completions: 1
  parallelism: 1

  template:
    metadata:
      name: test-job-pod
      labels: 
        app: batch-task  

    spec:
      containers:
        - name: batch-container-job
          image: busybox:latest
          command: ["sh", "-c", "echo hello from kubernetes!..by devops && sleep 10"]
      restartPolicy: Never



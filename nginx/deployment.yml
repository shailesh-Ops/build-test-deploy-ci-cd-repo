apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
  namespace: nginx 
  labels:
    app: nginx

spec:
  replicas: 3
  selector:
    matchLabels:
      app: nginx

  template:
    metadata:
      name: nginx-deployment-pods
      labels:
        app: nginx
        
    spec:
      containers:
      - name: nginx-container
        image: nginx:latest
        ports: 
        - containerPort: 80
        resources:
          requests:
            cpu: 100m
            memory: 165Mi
          limits:
            cpu: 200m
            memory: 265Mi
        livenessProbe:         # see the pods(containers) livenessprobes means live state
          httpGet:
            path: /
            port: 9000
      

        volumeMounts:
        - mountPath: /usr/share/nginx/html
          name: volume-pvc

      volumes:        
        - name: volume-pvc
          persistentVolumeClaim: 
            claimName: local-pvc


apiVersion: v1
kind: PersistentVolume

metadata:
  name: pv
  labels:
    app: local-storage
    namespace: nginx

spec:
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteOnce

  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-storage
  hostPath:
    path: /mnt/data
    
    

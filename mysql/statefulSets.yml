apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql-pods
  namespace: mysql-ns

spec:
  serviceName: mysql-service
  replicas: 2

  selector:
    matchLabels:
      app: mysql

  template:
    metadata:
      labels:
        app: mysql

    spec:
      containers:
        - name: mysql
          image: mysql:latest
          ports:
          - containerPort: 3306
          resources:
            requests:
              cpu: 100m
              memory: 129Mi
          limits:
            cpu: 200m
            memory: 220Mi

          env:
          - name: MYSQL_ROOT_PASSWORD
            valueFrom:
              secretKeyRef: 
                name: mysql-secret
                key: MYSQL_ROOT_PASSWORD

          - name: MYSQL_DATABASE
            valueFrom: 
              configMapKeyRef:
                name: mysql-configmap
                key: MYSQL_DATABASE

          volumeMounts:
          - name: mysql-data            
            mountPath: /var/lib/mysql

  
  volumeClaimTemplates:
  - metadata:
      name: mysql-data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 1Gi    

            




name: this is ci for python app

on:
  push:
    branches:
      - main

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: login to Dockerhub.io
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER_NAME }}
          password: ${{ secrets.DOCKER_LOGIN_PASS }}

      - name: build docker images
        working-directory: ./server-app
        run: |
          USERNAME=$(echo "${{ secrets.DOCKER_USER_NAME }}" | tr '[:upper:]' '[:lower:]')
          docker build -t $USERNAME/my-app-images:latest .    #  force lowercase

      - name: push images on Dockerhub.io
        run: |
          USERNAME=$(echo "${{ secrets.DOCKER_USER_NAME }}" | tr '[:upper:]' '[:lower:]')
          docker push $USERNAME/my-app-images:latest           # force lowercase

      
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql-pods
  namespace: mysql-ns

spec:
  serviceName: mysql-service
  replicas: 2

  selector:
    matchLabels:
      app: mysql

  template:
    metadata:
      labels:
        app: mysql

    spec:
      containers:
        - name: mysql
          image: mysql:latest
          ports:
          - containerPort: 3306

          env:
          - name: MYSQL_ROOT_PASSWORD
            value: "production"

          - name: MYSQL_DATABASE
            value: "devops-db"

          volumeMounts:
          - name: mysql-data            
            mountPath: /var/lib/mysql

  
  volumeClaimTemplates:
  - metadata:
      name: mysql-data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 1Gi    

            




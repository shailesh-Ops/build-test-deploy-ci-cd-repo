apiVersion: apps/v1
kind: Deployment
metadata:
  name: apache-deployment
  namespace: apache-server

spec:
  replicas: 2
  selector: 
    matchLabels:
      run: apache
  template:
    metadata:
      labels:
        run: apache

    spec:
      containers:
        - name: apache-deployment-app
          image: httpd:2.4 
          ports:
          - containerPort: 80 
          resources:
            requests:
              cpu: 100m
              memory: 150Mi
            limits:
              cpu: 150m
              memory: 200Mi


